<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login • UfaqTech SocialHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="auth-page">
    <div class="auth-shell">
      <div class="auth-visual">
        <img src="assets/images/UT_social-hub.png" alt="UfaqTech SocialHub logo" />
        <div class="auth-visual-copy">
          <h2>Welcome to UfaqTech SocialHub</h2>
          <p>Grow communities, publish links, and manage everything in one place.</p>
        </div>
      </div>

      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-brand-logo">
            <i class="fa-solid fa-circle-nodes text-blue"></i>
          </div>
          <h1 id="authTitle">Welcome back</h1>
          <p id="authSubtitle">Sign in or create your account to join the network.</p>
        </div>

        <div class="auth-toggle">
          <button class="toggle-btn active" data-mode="login">Login</button>
          <button class="toggle-btn" data-mode="signup">Sign Up</button>
        </div>

        <form id="loginForm" class="auth-form">
          <div class="field-group signup-only">
            <label for="fullName">Full Name</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-user input-icon"></i>
              <input id="fullName" name="fullName" type="text" placeholder="e.g. Awais Nawaz" />
            </div>
          </div>
          <div class="field-group">
            <label for="email">Email Address</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-envelope input-icon"></i>
              <input id="email" name="email" type="email" placeholder="you@example.com" required />
            </div>
          </div>
          <div class="field-group">
            <label for="password">Password</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-lock input-icon"></i>
              <input id="password" name="password" type="password" placeholder="••••••••" required />
              <button type="button" class="password-toggle-btn" id="togglePassword" aria-label="Show password">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="field-group signup-only">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-shield-halved input-icon"></i>
              <input id="confirmPassword" name="confirmPassword" type="password" placeholder="••••••••" />
            </div>
          </div>
          <button class="btn btn-primary btn-block" type="submit">Continue</button>
        </form>

        <div class="divider"><span>or</span></div>
        <button type="button" class="btn btn-outline btn-block social-btn" id="googleAuthBtn">
          <i class="fa-brands fa-google"></i> Continue with Google
        </button>

        <p id="authMessage" class="message"></p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
